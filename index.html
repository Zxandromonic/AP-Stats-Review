<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHYS // STUDY</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Saira+Condensed:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0ede6;--bg2:#e8e4dc;--bg3:#ddd8ce;--ink:#1a1a18;--ink2:#2e2e2a;--ink3:#4a4a44;--muted:#888880;--border:#b8b4aa;--border2:#9a968e;--green:#2a6b3a;--red:#c0392b}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--ink);font-family:'Share Tech Mono',monospace;font-size:13px}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}

/* SELECT */
#boot{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fi .4s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
#boot.out{animation:fo .25s ease forwards}
@keyframes fo{to{opacity:0;pointer-events:none}}
.bc{position:absolute;width:18px;height:18px;border-color:var(--ink);border-style:solid}
.bc.tl{top:18px;left:18px;border-width:2px 0 0 2px}.bc.tr{top:18px;right:18px;border-width:2px 2px 0 0}
.bc.bl{bottom:18px;left:18px;border-width:0 0 2px 2px}.bc.br{bottom:18px;right:18px;border-width:0 2px 2px 0}
.b-ey{font-family:'Saira Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.3em;color:var(--muted);margin-bottom:8px;text-transform:uppercase}
.b-title{font-family:'Saira Condensed',sans-serif;font-size:60px;font-weight:900;letter-spacing:-.02em;line-height:.9;text-align:center;margin-bottom:6px}
.b-title span{color:var(--muted)}
.b-div{width:60px;height:2px;background:var(--ink);margin:16px auto 32px}
.sel-row{display:flex;gap:14px;margin-bottom:36px}
.mc{width:210px;border:2px solid var(--ink);cursor:pointer;transition:all .15s;position:relative;background:var(--bg)}
.mc:hover{background:var(--ink);color:var(--bg)}
.mc:hover .mc-tag{background:var(--bg);color:var(--ink)}
.mc:hover .mc-body,.mc:hover .mc-sl{color:rgba(240,237,230,.5)}
.mc:hover .mc-sv{color:var(--bg)}
.mc:hover .mc-stat{border-color:rgba(255,255,255,.2)}
.mc-tag{background:var(--ink);color:var(--bg);font-family:'Saira Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.2em;padding:5px 12px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.mc-dot{width:6px;height:6px;background:var(--bg)}.mc:hover .mc-dot{background:var(--ink)}
.mc-inner{padding:14px}
.mc-title{font-family:'Saira Condensed',sans-serif;font-size:30px;font-weight:900;line-height:.95;margin-bottom:7px}
.mc-body{font-size:10px;color:var(--ink3);line-height:1.65;margin-bottom:12px;letter-spacing:.02em}
.mc-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mc-stat{border:1px solid var(--border);padding:6px 8px}
.mc-sv{font-size:16px;font-weight:700;font-family:'Saira Condensed',sans-serif}
.mc-sl{font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.b-hint{font-size:9px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase}

/* APP */
#app{display:none;height:100vh;flex-direction:column}
#app.show{display:flex}
.hud{background:var(--ink);color:var(--bg);display:flex;align-items:stretch;flex-shrink:0}
.hb{padding:8px 14px;border-right:1px solid rgba(255,255,255,.12);display:flex;flex-direction:column;justify-content:center}
.hbl{font-size:8px;letter-spacing:.2em;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:2px;font-family:'Saira Condensed',sans-serif}
.hbv{font-family:'Saira Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.05em;line-height:1}
.hbv.live{color:#7fff7f}
.hbsp{flex:1}
.hbprog{padding:8px 16px;display:flex;flex-direction:column;justify-content:center;min-width:160px}
.hbpr{display:flex;justify-content:space-between;font-size:8px;color:rgba(255,255,255,.35);letter-spacing:.1em;margin-bottom:4px;font-family:'Saira Condensed',sans-serif}
.hbpt{height:2px;background:rgba(255,255,255,.15)}
.hbpf{height:100%;background:#fff;transition:width .4s}
.shell{flex:1;display:flex;overflow:hidden}
.sidebar{width:230px;min-width:230px;background:var(--bg2);border-right:2px solid var(--ink);display:flex;flex-direction:column;overflow:hidden}
.sbh{background:var(--ink);color:var(--bg);font-family:'Saira Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.2em;padding:8px 12px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.sbbk{cursor:pointer;font-size:9px;opacity:.5;transition:opacity .1s;letter-spacing:.05em}
.sbbk:hover{opacity:1}
.sbnav{flex:1;overflow-y:auto;padding:4px 0 20px}
.sbnav::-webkit-scrollbar{width:3px}
.sbnav::-webkit-scrollbar-thumb{background:var(--border)}
.glbl{font-size:8px;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);padding:10px 12px 3px;font-family:'Saira Condensed',sans-serif;font-weight:700}
.ni{display:flex;align-items:center;gap:7px;padding:7px 12px;cursor:pointer;font-size:11px;color:var(--ink3);border-left:3px solid transparent;transition:all .1s;letter-spacing:.02em;font-family:'Saira Condensed',sans-serif;font-weight:600}
.ni:hover{background:var(--bg3);color:var(--ink)}
.ni.active{background:var(--ink);color:var(--bg);border-left-color:var(--bg)}
.ni.done{color:var(--green)}.ni.done .nd{background:var(--green)}.ni.active .nd{background:var(--bg)}
.nd{width:5px;height:5px;background:var(--border);flex-shrink:0;transform:rotate(45deg)}
.ni .qsc{margin-left:auto;font-size:9px;color:var(--muted)}.ni.done .qsc{color:var(--green)}.ni.active .qsc{color:rgba(240,237,230,.5)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.cbar{background:var(--bg2);border-bottom:2px solid var(--ink);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ctag{font-family:'Saira Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3)}
.nbtns{display:flex;gap:6px}
.nbtn{background:transparent;border:2px solid var(--ink);color:var(--ink);font-family:'Share Tech Mono',monospace;font-size:10px;padding:5px 13px;cursor:pointer;letter-spacing:.06em;transition:all .12s;text-transform:uppercase}
.nbtn:hover{background:var(--ink);color:var(--bg)}.nbtn.pri{background:var(--ink);color:var(--bg)}.nbtn.pri:hover{opacity:.85}.nbtn:disabled{opacity:.3;cursor:not-allowed}
.content{flex:1;overflow-y:auto;padding:24px 28px 80px;background:var(--bg)}
.content::-webkit-scrollbar{width:4px}.content::-webkit-scrollbar-thumb{background:var(--border2)}

/* LESSON */
.lesson{max-width:820px;animation:lup .22s ease}
@keyframes lup{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.l-ey{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-family:'Saira Condensed',sans-serif;font-weight:700}
.l-title{font-family:'Saira Condensed',sans-serif;font-size:44px;font-weight:900;line-height:.9;margin-bottom:10px;letter-spacing:-.01em;border-bottom:2px solid var(--ink);padding-bottom:12px}
.l-desc{font-size:12px;color:var(--ink3);line-height:1.8;margin-bottom:18px;letter-spacing:.02em}
.cb{border:2px solid var(--ink);padding:14px 16px;margin-bottom:12px;background:var(--bg);position:relative}
.cb h3{font-family:'Saira Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--ink);margin-bottom:9px;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.cb h3::before{content:'//';color:var(--muted);font-size:10px;font-family:'Share Tech Mono',monospace}
.cb p,.cb li{font-size:12px;line-height:1.85;color:var(--ink2)}
.cb ul,.cb ol{padding-left:18px}.cb li{margin-bottom:3px}
.cb h4{font-size:10px;font-weight:700;color:var(--muted);margin:12px 0 5px;letter-spacing:.15em;text-transform:uppercase;font-family:'Saira Condensed',sans-serif}
.eq{border:2px solid var(--ink);padding:13px 16px;margin:10px 0;background:var(--ink);color:var(--bg)}
.eql{font-size:8px;letter-spacing:.25em;text-transform:uppercase;color:rgba(240,237,230,.4);margin-bottom:7px;font-family:'Saira Condensed',sans-serif;font-weight:700}
.eqb{font-size:12.5px;line-height:1.9;color:#f0ede6;font-family:'Share Tech Mono',monospace;white-space:pre-line}
.eqn{font-size:10px;color:rgba(240,237,230,.45);margin-top:7px;line-height:1.6;font-family:'Share Tech Mono',monospace}
.flag{border:2px solid var(--ink);padding:12px 16px;margin:10px 0;position:relative}
.flag::after{content:attr(data-f);position:absolute;top:-1px;right:12px;background:var(--ink);color:var(--bg);font-size:8px;letter-spacing:.2em;padding:2px 8px;font-family:'Saira Condensed',sans-serif;font-weight:700;text-transform:uppercase}
.flag p{font-size:12px;line-height:1.75;color:var(--ink2)}
.hl{font-weight:700;text-decoration:underline;text-underline-offset:2px;text-decoration-thickness:1px}

/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--ink);margin-top:28px}
.tab{padding:8px 16px;cursor:pointer;font-family:'Saira Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-right:1px solid var(--border);transition:all .12s;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab:hover{color:var(--ink);background:var(--bg3)}.tab.act{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.tbc{display:none;padding-top:18px}.tbc.act{display:block;animation:lup .2s ease}

/* MCQ */
.qblock{border:2px solid var(--ink);padding:14px 16px;margin-bottom:10px;background:var(--bg2)}
.qnum{font-size:8px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:7px;font-family:'Saira Condensed',sans-serif}
.qtext{font-size:13px;font-weight:700;line-height:1.55;margin-bottom:11px;color:var(--ink)}
.qopts{display:flex;flex-direction:column;gap:5px}
.qopt{background:var(--bg);border:2px solid var(--border);padding:9px 13px;cursor:pointer;font-size:11px;color:var(--ink3);text-align:left;transition:all .1s;letter-spacing:.02em;font-family:'Share Tech Mono',monospace;display:flex;align-items:flex-start;gap:8px}
.ql{font-family:'Saira Condensed',sans-serif;font-size:13px;font-weight:700;flex-shrink:0;color:var(--muted)}
.qopt:hover:not(:disabled){background:var(--ink);color:var(--bg);border-color:var(--ink)}.qopt:hover:not(:disabled) .ql{color:var(--bg)}
.qopt.cor{border-color:var(--green)!important;background:rgba(42,107,58,.08)!important;color:var(--green)!important}.qopt.cor .ql{color:var(--green)!important}
.qopt.wrg{border-color:var(--red)!important;background:rgba(192,57,43,.05)!important;color:var(--red)!important}.qopt.wrg .ql{color:var(--red)!important}
.qopt:disabled{cursor:default}
.qfb{display:none;margin-top:8px;padding:9px 13px;font-size:11px;line-height:1.65;border:2px solid}
.qfb.show{display:block;animation:lup .2s ease}
.qfb.ok{border-color:var(--green);color:var(--green);background:rgba(42,107,58,.05)}
.qfb.no{border-color:var(--red);color:var(--red);background:rgba(192,57,43,.04)}
.mcq-done{border:2px solid var(--ink);padding:14px 18px;background:var(--ink);color:var(--bg);margin-top:14px;display:flex;align-items:center;gap:12px}
.mcq-done-main{font-family:'Saira Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:.05em}
.mcq-done-sub{font-size:10px;color:rgba(240,237,230,.5);margin-top:2px;letter-spacing:.05em}

/* FRQ */
.frq-block{border:2px solid var(--ink);margin-bottom:14px;background:var(--bg)}
.frq-head{background:var(--ink);color:var(--bg);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.frq-head h3{font-family:'Saira Condensed',sans-serif;font-size:14px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
.frq-pts{font-size:10px;color:rgba(240,237,230,.5);letter-spacing:.1em}
.frq-body{padding:16px}
.frq-prompt{font-size:12.5px;line-height:1.8;color:var(--ink);margin-bottom:12px;font-family:'Share Tech Mono',monospace}
.frq-parts{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.frq-part{background:var(--bg2);border:1px solid var(--border);padding:10px 12px}
.frq-plbl{font-family:'Saira Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:5px}
.frq-pq{font-size:12px;line-height:1.75;color:var(--ink2)}
.sg-btn{background:transparent;border:2px solid var(--ink);color:var(--ink);font-family:'Share Tech Mono',monospace;font-size:10px;padding:7px 16px;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;transition:all .12s;width:100%}
.sg-btn:hover{background:var(--ink);color:var(--bg)}
.sg{display:none;border-top:2px solid var(--ink);padding:14px 16px;background:var(--bg3)}
.sg.show{display:block;animation:lup .2s ease}
.sg h4{font-family:'Saira Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.sgp{margin-bottom:12px}
.sgpl{font-family:'Saira Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--ink);margin-bottom:5px}
.sgi{display:flex;gap:8px;margin-bottom:4px;font-size:11px;color:var(--ink2);line-height:1.65}
.sgi::before{content:'▸';color:var(--muted);flex-shrink:0;margin-top:1px}
.sgpts{font-family:'Saira Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--green);background:rgba(42,107,58,.08);border:1px solid rgba(42,107,58,.2);padding:1px 6px;flex-shrink:0;height:fit-content;white-space:nowrap}

/* WELCOME */
.welcome{max-width:600px;animation:lup .3s ease}
.w-ey{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;font-family:'Saira Condensed',sans-serif}
.w-title{font-family:'Saira Condensed',sans-serif;font-size:52px;font-weight:900;line-height:.9;margin-bottom:12px;letter-spacing:-.02em;border-bottom:2px solid var(--ink);padding-bottom:12px}
.w-p{font-size:12px;color:var(--ink3);line-height:1.8;margin-bottom:20px}
.w-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:22px}
.w-stat{border:2px solid var(--ink);padding:12px}
.w-sv{font-family:'Saira Condensed',sans-serif;font-size:26px;font-weight:900}
.w-sl{font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.startbtn{background:var(--ink);color:var(--bg);border:2px solid var(--ink);padding:11px 26px;font-family:'Share Tech Mono',monospace;font-size:11px;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;transition:all .15s}
.startbtn:hover{background:var(--bg);color:var(--ink)}

.sg-solution{background:#fff;border:1px solid var(--border);border-left:3px solid var(--ink);padding:10px 14px;margin:6px 0 8px;font-size:11.5px;line-height:1.85;color:var(--ink2);font-family:'Share Tech Mono',monospace;white-space:pre-wrap}
.sg-rubric-lbl{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;font-family:'Saira Condensed',sans-serif;font-weight:700}
</style>
</head>
<body>
<div id="boot">
  <div class="bc tl"></div><div class="bc tr"></div><div class="bc bl"></div><div class="bc br"></div>
  <div class="b-ey">Physics Study System</div>
  <div class="b-title">AP STATS<br><span>STUDY</span></div>
  <div class="b-div"></div>
  <div style="text-align:center;margin-bottom:36px">
    <div class="mc" style="width:260px;margin:0 auto" onclick="launch('stats')">
      <div class="mc-tag">AP STATISTICS <span class="mc-dot"></span></div>
      <div class="mc-inner">
        <div class="mc-title">AP STATS<br>FULL COURSE</div>
        <div class="mc-body">ALL 9 UNITS. EVERY TOPIC. DEEP EXPLANATIONS, WORKED EXAMPLES, AP-LEVEL MCQs AND FRQs WITH SCORING GUIDES.</div>
        <div class="mc-stats">
          <div class="mc-stat"><div class="mc-sv">9</div><div class="mc-sl">Units</div></div>
          <div class="mc-stat"><div class="mc-sv">135+</div><div class="mc-sl">MCQs</div></div>
          <div class="mc-stat"><div class="mc-sv">18</div><div class="mc-sl">FRQs</div></div>
          <div class="mc-stat"><div class="mc-sv">ALG</div><div class="mc-sl">Level</div></div>
        </div>
      </div>
    </div>
  </div>
  <div class="b-hint">Select a course to begin</div>
</div>

<div id="app">
  <div class="hud">
    <div class="hb"><div class="hbl">Course</div><div class="hbv" id="hud-course">—</div></div>
    
    <div class="hb"><div class="hbl">Topic</div><div class="hbv" id="hud-topic">—</div></div>
    <div class="hbsp"></div>
    <div class="hbprog">
      <div class="hbpr"><span>PROGRESS</span><span id="hpct">0%</span></div>
      <div class="hbpt"><div class="hbpf" id="hpfill" style="width:0%"></div></div>
    </div>
    <div class="hb" style="cursor:pointer" onclick="goBack()"><div class="hbl">Exit</div><div class="hbv" style="font-size:11px;opacity:.6">◁ BACK</div></div>
  </div>
  <div class="shell">
    <div class="sidebar">
      <div class="sbh"><span id="sb-name">—</span><span class="sbbk" onclick="goBack()">EXIT</span></div>
      <div class="sbnav" id="nav"></div>
    </div>
    <div class="main">
      <div class="cbar">
        <span class="ctag" id="ctag">—</span>
        <div class="nbtns">
          <button class="nbtn" id="pbtn" onclick="step(-1)" disabled>◁ PREV</button>
          <button class="nbtn pri" id="nbtn" onclick="step(1)">NEXT ▷</button>
        </div>
      </div>
      <div class="content" id="content"></div>
    </div>
  </div>
</div>
<script>
// ── HELPERS ──
function toggleSG(id){
  const el=document.getElementById('sg-'+id),btn=document.getElementById('sgb-'+id);
  if(!el)return;
  const s=el.classList.toggle('show');
  btn.textContent=s?'▲ HIDE SCORING GUIDE':'▼ SHOW SCORING GUIDE';
}
function swTab(tid,name){
  const w=document.getElementById('tw-'+tid);
  if(!w)return;
  w.querySelectorAll('.tab').forEach(t=>t.classList.toggle('act',t.dataset.t===name));
  w.querySelectorAll('.tbc').forEach(t=>t.classList.toggle('act',t.id===`tc-${tid}-${name}`));
}
function answer(ti,qi,ch){
  const k=`${ti}_${qi}`;
  if(qA[k]!==undefined)return;
  qA[k]=ch;
  const q=T[ti].qs[qi];
  if(!qS[ti])qS[ti]={c:0,t:T[ti].qs.length};
  if(ch===q.ans)qS[ti].c++;

  // Update buttons in-place — no scroll reset
  const L=['A','B','C','D'];
  const qblock=document.querySelector(`#tc-${ti}-mcq .qblock:nth-child(${qi+1})`);
  if(qblock){
    const btns=qblock.querySelectorAll('.qopt');
    btns.forEach((btn,oi)=>{
      btn.disabled=true;
      if(oi===q.ans)btn.classList.add('cor');
      else if(oi===ch&&ch!==q.ans)btn.classList.add('wrg');
    });
    const fb=qblock.querySelector('.qfb');
    if(fb){
      const ok=ch===q.ans;
      fb.className=`qfb show ${ok?'ok':'no'}`;
      fb.textContent=(ok?'✓ Correct — ':'✗ Incorrect — ')+q.fb;
    }
  }

  const allDone=T[ti].qs.every((_,i)=>qA[`${ti}_${i}`]!==undefined);
  if(allDone){
    if(ti>0)done.add(ti);
    // Append score banner to MCQ tab without rebuilding
    const mcqTab=document.getElementById(`tc-${ti}-mcq`);
    if(mcqTab&&!mcqTab.querySelector('.mcq-done')){
      const sc=qS[ti];
      const msg=sc.c===sc.t?'Perfect. Move on.':sc.c>=sc.t*.8?'Strong — review misses.':sc.c>=sc.t*.6?'Review before moving on.':'Re-read the lesson.';
      const banner=document.createElement('div');
      banner.className='mcq-done';
      banner.innerHTML=`<div><div class="mcq-done-main">${sc.c} / ${sc.t} CORRECT</div><div class="mcq-done-sub">${msg}</div></div>`;
      mcqTab.appendChild(banner);
    }
    // Update sidebar score
    buildNav();
  }
  updateProg();
}
function buildNav(){
  const nav=document.getElementById('nav');nav.innerHTML='';
  let lg=null;
  T.forEach((t,i)=>{

render:()=>`<div class="lesson">
<div class="l-ey">Unit 1 — Exploratory Data Analysis</div><div class="l-title">EXPLORING ONE-VARIABLE DATA</div>
<div class="l-desc">The foundation of statistics: describing and summarizing distributions of a single variable. You need to know when to use each measure, what the shape tells you, and how transformations affect your summaries.</div>
<div class="cb"><h3>Types of Variables</h3>
<ul>
<li><span class="hl">Categorical:</span> Records which group or category. Summarize with counts, proportions, bar charts, pie charts.</li>
<li><span class="hl">Quantitative:</span> Records a numerical measurement. Summarize with shape, center, spread, outliers.</li>
</ul></div>
<div class="cb"><h3>Describing Distributions — SOCS</h3>
<p>When describing any distribution, address all four: <span class="hl">Shape, Outliers, Center, Spread</span></p>
<ul>
<li><span class="hl">Shape:</span> Symmetric, left-skewed (long left tail), right-skewed (long right tail), uniform, bimodal</li>
<li><span class="hl">Outliers:</span> Identify individual unusual values. Use the 1.5×IQR rule.</li>
<li><span class="hl">Center:</span> Mean or median (choose based on shape)</li>
<li><span class="hl">Spread:</span> SD or IQR (choose based on shape)</li>
</ul>
<div class="eq"><div class="eql">Skewness and Mean vs Median</div><div class="eqb">Right-skewed: mean > median  (outliers pull mean right)
Left-skewed:  mean < median  (outliers pull mean left)
Symmetric:    mean ≈ median

Use MEDIAN + IQR for skewed distributions or when outliers are present.
Use MEAN + SD for symmetric distributions without outliers.</div></div></div>
<div class="cb"><h3>Measures of Center</h3>
<div class="eq"><div class="eql">Mean and Median</div><div class="eqb">Mean: x̄ = (Σxᵢ)/n    (arithmetic average — NOT resistant)

Median: middle value when ordered (resistant to outliers)
  n odd: median = value at position (n+1)/2
  n even: median = average of values at positions n/2 and n/2+1

Mode: most frequent value (mainly for categorical data)</div></div></div>
<div class="cb"><h3>Measures of Spread</h3>
<div class="eq"><div class="eql">IQR, Variance, Standard Deviation</div><div class="eqb">Range = Max − Min   (simple but sensitive to outliers)

IQR = Q3 − Q1  (middle 50% of data — RESISTANT)
  Outlier rule: value is outlier if:
    x < Q1 − 1.5×IQR  or  x > Q3 + 1.5×IQR

Variance: s² = Σ(xᵢ − x̄)² / (n−1)   [sample; use n−1 not n]
SD: s = √s²    (same units as data — NOT resistant)

Interpretation: s is the typical distance of values from the mean.</div></div></div>
<div class="cb"><h3>Five-Number Summary and Boxplots</h3>
<div class="eq"><div class="eql">Five-Number Summary</div><div class="eqb">Min | Q1 | Median | Q3 | Max

Boxplot: box from Q1 to Q3 (width = IQR)
  Line inside box = median
  Whiskers to most extreme non-outlier values
  Individual points for outliers</div></div></div>
<div class="cb"><h3>z-Scores and Standardizing</h3>
<div class="eq"><div class="eql">z-Score</div><div class="eqb">z = (x − μ) / σ    [population]
z = (x − x̄) / s   [sample]

Interpretation: number of standard deviations from the mean
  z > 0: above mean     z < 0: below mean
  |z| > 2 or 3: unusual value

Standardizing: converting to z-scores makes distributions
comparable regardless of original units or scale.</div></div></div>
<div class="cb"><h3>Linear Transformations</h3>
<div class="eq"><div class="eql">Effect on Summary Statistics</div><div class="eqb">If y = a + bx:
  New mean:    ȳ = a + b·x̄
  New SD:      sᵧ = |b|·sₓ   (SD only scales, not shifts)
  New median:  a + b·(old median)
  New IQR:     |b|·(old IQR)
  Shape:       unchanged (if b > 0)

Adding constant a: shifts center, does NOT change spread
Multiplying by b: changes both center AND spread</div></div></div>
<div class="cb"><h3>Displaying Distributions</h3>
<ul>
<li><span class="hl">Dotplot:</span> each value = a dot. Good for small datasets. Shows all individual values.</li>
<li><span class="hl">Stemplot:</span> splits digits into stems and leaves. Good for small-medium datasets.</li>
<li><span class="hl">Histogram:</span> groups into bins. Area = frequency. Best for large datasets.</li>
<li><span class="hl">Boxplot:</span> shows 5-number summary. Best for comparing multiple distributions.</li>
</ul></div>
<div class="flag" data-f="AP EXAM KEY"><p>Always describe distributions in context: not "the distribution is right-skewed" but "the distribution of exam scores is right-skewed, with most students scoring between 60-80 and a few students scoring very high." Always use SOCS and always refer to the variable and units.</p></div>
</div>`},

{q:'A residual is defined as:',opts:['ŷ − y','y − ŷ','y − ȳ','ŷ − ȳ'],ans:1,fb:'Residual = observed − predicted = y − ŷ. Positive residual: actual value is above the regression line. Negative residual: actual value is below the line. The sum of all residuals = 0 for the LSRL.'},
{q:'The slope of the LSRL ŷ = a + bx is b = 1.5. This means:',opts:['y equals 1.5 when x = 0','For each 1-unit increase in x, y increases by exactly 1.5','For each 1-unit increase in x, the predicted y increases by 1.5','The correlation is 1.5'],ans:2,fb:'The slope b is the predicted change in y for a 1-unit increase in x. The key word is "predicted" — individual points vary around this. The slope does not equal r (unless data is standardized).'},
{q:'Which of the following is evidence that a linear model is NOT appropriate?',opts:['A residual plot with random scatter','r² = 0.95','A residual plot showing a curved pattern','A positive slope'],ans:2,fb:'A curved pattern in the residual plot means the relationship is nonlinear — a line is the wrong model. Residuals should scatter randomly (no pattern) around zero if the linear model is appropriate. High r² doesn\'t guarantee linearity.'},
{q:'The LSRL always passes through which point?',opts:['The origin (0,0)','The point (x̄, ȳ)','The point with the largest y-value','The median of each variable'],ans:1,fb:'The LSRL always passes through the point (x̄, ȳ) — the means of both variables. This is a mathematical property: substituting x = x̄ into ŷ = a + bx gives ŷ = ȳ.'},
{q:'Correlation r measures:',opts:['The slope of the relationship','The strength and direction of a linear relationship','The strength of any association','Causation between two variables'],ans:1,fb:'r measures the strength and direction of a LINEAR association. r = 0 doesn\'t mean no relationship — it means no LINEAR relationship (could be strong curved). Correlation never implies causation.'},
{q:'An outlier in a scatterplot that has a large effect on the slope of the LSRL is called:',opts:['A leverage point','An influential observation','A high-residual point','A confounding variable'],ans:1,fb:'An influential observation is one whose removal would substantially change the regression line (slope or intercept). Points with extreme x-values (high leverage) tend to be influential. A point can have a large residual but low influence if it is not at an extreme x-value.'},
{q:'Which value of r indicates the strongest linear association?',opts:['r = 0.75','r = −0.82','r = 0.50','r = −0.40'],ans:1,fb:'The strength of linear association is determined by |r|, not the sign. |−0.82| = 0.82 is the largest magnitude, indicating the strongest (negative) linear relationship. The sign only tells direction.'},
{q:'The LSRL for predicting y from x has slope b = r(sᵧ/sₓ). If r = 0.6, sₓ = 2, sᵧ = 5, the slope is:',opts:['0.6','1.5','3.0','0.24'],ans:1,fb:'b = r(sᵧ/sₓ) = 0.6 × (5/2) = 0.6 × 2.5 = 1.5. The slope formula connects the correlation to the actual units of the data. This also confirms: slope and r always have the same sign.'},
{q:'Which of the following would NOT change the value of r?',opts:['Adding 10 to every x value','Multiplying every x value by 2','Swapping x and y variables','All of the above would not change r'],ans:3,fb:'Correlation r is unitless and is not affected by linear transformations of either variable (adding constants, multiplying by constants) or by swapping x and y. r(x,y) = r(y,x). This makes r scale-invariant and direction-invariant.'},
{q:'Extrapolation refers to:',opts:['Using the regression line to predict within the range of observed x-values','Using the regression line to predict outside the range of observed x-values','Plotting residuals against fitted values','Transforming data to achieve linearity'],ans:1,fb:'Extrapolation is using the LSRL to make predictions for x-values outside the range of the data used to build the model. This is dangerous because the linear relationship may not hold beyond the observed range.'},
{q:'A lurking variable is:',opts:['A variable with a very large residual','A variable not included in the analysis that affects both x and y','The response variable in a regression','An influential observation'],ans:1,fb:'A lurking (confounding) variable is one not measured or included that influences both the explanatory and response variables, creating a spurious association. For example, ice cream sales and drowning rates are correlated — heat is the lurking variable causing both.'},
{q:'If the residual plot shows increasing spread as x increases, the linear model:',opts:['Is appropriate — spread is expected','May be inappropriate due to non-constant variance','Should have a steeper slope','Has an incorrect y-intercept'],ans:1,fb:'Non-constant variance (heteroscedasticity) in residuals violates assumptions of the linear model. Increasing spread means predictions become less reliable at higher x-values. A transformation (like log y) may help achieve constant variance.'}
],
frqs:[
{title:'Regression Analysis',pts:12,
prompt:'A study recorded the number of hours students studied (x) and their exam score (y) for 10 students. Summary statistics: x̄ = 5.2 hr, ȳ = 72.4 pts, sₓ = 2.1 hr, sᵧ = 9.8 pts, r = 0.87.',
parts:[
{q:'(a) Find the equation of the least-squares regression line.',pts:4,
solution:'Step 1 — Find slope:\n  b = r(sᵧ/sₓ) = 0.87 × (9.8/2.1) = 0.87 × 4.667 = 4.06\n\nStep 2 — Find y-intercept:\n  The LSRL passes through (x̄, ȳ):\n  ȳ = a + b·x̄\n  72.4 = a + 4.06(5.2)\n  72.4 = a + 21.11\n  a = 72.4 − 21.11 = 51.29\n\nEquation: ŷ = 51.29 + 4.06x\n\nInterpretation: For each additional hour studied, the predicted exam score increases by 4.06 points.',
rubric:[{pts:1,text:'Correct slope formula: b = r(sᵧ/sₓ)'},{pts:1,text:'Correct slope ≈ 4.06'},{pts:1,text:'Uses (x̄,ȳ) to find intercept'},{pts:1,text:'Correct equation ŷ = 51.29 + 4.06x'}]},
{q:'(b) Interpret r² in context.',pts:2,
solution:'r² = (0.87)² = 0.757 = 75.7%\n\nAbout 75.7% of the variation in exam scores is explained by the linear relationship with hours studied. The remaining 24.3% of variation in scores is due to other factors not captured by this linear model.',
rubric:[{pts:1,text:'Computes r² = 0.757 or 75.7%'},{pts:1,text:'Correctly interprets: "% of variation in [y] explained by linear relationship with [x]" in context'}]},
{q:'(c) A student studied for 7 hours. Predict their exam score and determine the residual if they actually scored 82.',pts:3,
solution:'Predicted: ŷ = 51.29 + 4.06(7) = 51.29 + 28.42 = 79.71 points\n\nResidual = observed − predicted = 82 − 79.71 = +2.29 points\n\nInterpretation: This student scored 2.29 points ABOVE what the regression line predicted for someone who studied 7 hours.',
rubric:[{pts:1,text:'Correct predicted value ≈ 79.7'},{pts:1,text:'Residual = y − ŷ = 82 − 79.7 = 2.3'},{pts:1,text:'Interprets residual direction correctly (above line)'}]},
{q:'(d) Is it reasonable to use this model to predict the score of a student who studied 15 hours? Explain.',pts:3,
solution:'No, it is not reasonable. The data was collected for students studying between approximately 1–9 hours (since x̄=5.2 and sₓ=2.1, most values are within a few SDs). Predicting at x=15 hours would be extrapolation — using the model far outside the range of observed data. The linear relationship may not hold at 15 hours, and the model might predict scores above 100, which is impossible.',
rubric:[{pts:1,text:'States prediction would be extrapolation'},{pts:1,text:'Identifies 15 hours is outside the data range'},{pts:1,text:'Explains why extrapolation is unreliable / result may be nonsensical'}]}
]},
{title:'Residual Analysis',pts:10,
prompt:'A regression model predicts selling price (y, in $1000s) from square footage (x) of homes. The residual plot shows a curved, U-shaped pattern. r² = 0.82.',
parts:[
{q:'(a) Despite r² = 0.82, explain why this linear model may NOT be appropriate.',pts:3,
solution:'A curved (U-shaped) pattern in the residual plot indicates that the linear model is NOT appropriate. If the linear model were correct, residuals would scatter randomly around zero with no pattern. The U-shaped pattern means the linear model systematically underestimates prices for small and large homes, and overestimates for medium-sized homes. The relationship between square footage and price is nonlinear.',
rubric:[{pts:1,text:'States curved pattern in residual plot indicates nonlinearity'},{pts:1,text:'Explains residuals should be random if linear model fits'},{pts:1,text:'Notes systematic over/underestimation with specific description'}]},
{q:'(b) A data analyst suggests trying ŷ = a + b·log(x). How would you assess whether this transformation is helpful?',pts:3,
solution:'After fitting the model with log(x), create a new residual plot (residuals vs. log(x) or vs. fitted values). If this residual plot shows random scatter with no pattern, the transformation successfully linearized the relationship. Also compare r² values — if r² increases after transformation, the transformed model explains more variation. The transformation is helpful if the curved pattern disappears.',
rubric:[{pts:1,text:'States: create residual plot after transformation'},{pts:1,text:'Assess whether pattern disappears (random scatter)'},{pts:1,text:'Can also compare r² or check for linearity in the transformed scatterplot'}]},
{q:'(c) One home has a very high leverage. Explain what this means and why it matters.',pts:2,
solution:'A high leverage point has an extreme x-value (square footage far from the mean). It matters because high-leverage points can be influential — they can dramatically pull the regression line toward themselves. If removed, the slope and/or intercept might change substantially. High leverage doesn\'t necessarily mean the point is an outlier in y, but it has the potential to distort the regression.',
rubric:[{pts:1,text:'Correctly defines high leverage as extreme x-value'},{pts:1,text:'Explains potential influence on slope/intercept if removed'}]},
{q:'(d) The correlation between price and square footage is r = 0.91. A realtor claims "square footage causes higher prices." Is this valid? Explain.',pts:2,
solution:'No, this is not valid. Correlation does not imply causation. While there is a strong positive linear association between square footage and price (r = 0.91), this does not mean larger square footage directly causes higher prices. There could be lurking variables — such as neighborhood quality, age of home, number of bathrooms — that influence both square footage and price simultaneously. To establish causation, you would need a controlled experiment, which is not feasible here.',
rubric:[{pts:1,text:'States correlation does not imply causation'},{pts:1,text:'Identifies possible lurking variables or explains why an experiment would be needed'}]}
]}
],
render:()=>`<div class="lesson">
<div class="l-ey">Unit 2 — Exploratory Data Analysis</div><div class="l-title">EXPLORING TWO-VARIABLE DATA</div>
<div class="l-desc">Regression analysis describes the linear relationship between two quantitative variables. The key skills: interpret the slope and intercept in context, use r² correctly, analyze residual plots, and avoid over-interpreting correlation.</div>
<div class="cb"><h3>Scatterplots — What to Describe</h3>
<p>When describing a scatterplot, address: <span class="hl">Direction, Form, Strength, Outliers</span></p>
<ul>
<li><span class="hl">Direction:</span> Positive (both increase together) or negative (one increases as other decreases)</li>
<li><span class="hl">Form:</span> Linear, curved, no pattern</li>
<li><span class="hl">Strength:</span> How closely points follow the pattern (weak/moderate/strong)</li>
<li><span class="hl">Outliers:</span> Points that don\'t follow the overall pattern</li>
</ul></div>
<div class="cb"><h3>Correlation Coefficient r</h3>
<div class="eq"><div class="eql">Correlation</div><div class="eqb">r = (1/(n−1)) · Σ[(xᵢ−x̄)/sₓ · (yᵢ−ȳ)/sᵧ]

Properties:
  −1 ≤ r ≤ +1
  Sign = direction of association
  |r| = strength: 0=none, 1=perfect linear
  r is unitless and symmetric: r(x,y) = r(y,x)
  r is not changed by linear transformations of x or y
  r = 0 does not mean no association (could be curved)
  r measures ONLY linear association</div></div></div>
<div class="cb"><h3>Least-Squares Regression Line (LSRL)</h3>
<div class="eq"><div class="eql">LSRL Equation and Formulas</div><div class="eqb">ŷ = a + bx     (predicted y, not actual y)

Slope:     b = r · (sᵧ/sₓ)
Intercept: a = ȳ − b·x̄   (derived from passing through (x̄,ȳ))

The LSRL minimizes Σ(yᵢ − ŷᵢ)² = Σ(residuals²)
The LSRL always passes through (x̄, ȳ)

Interpreting slope: "For each 1-unit increase in [x], the predicted [y] increases/decreases by [b] [units]."
Interpreting intercept: "When [x] = 0, the predicted [y] is [a] [units]." (Only if x=0 is meaningful.)</div></div></div>
<div class="cb"><h3>Residuals and Residual Plots</h3>
<div class="eq"><div class="eql">Residuals</div><div class="eqb">Residual = observed − predicted = y − ŷ
Σ(residuals) = 0   always true for LSRL

Coefficient of determination: r² = fraction of variation
in y explained by the linear relationship with x.
"r²×100% of the variation in [y] is explained by the
linear relationship with [x]."

Good residual plot: random scatter, no pattern, constant spread
Bad residual plot: curved pattern → relationship is nonlinear
                   fan shape → non-constant variance</div></div></div>
<div class="cb"><h3>Influential Observations</h3>
<ul>
<li><span class="hl">High leverage:</span> Extreme x-value (far from x̄). Has the potential to influence the line.</li>
<li><span class="hl">Influential:</span> Removing it substantially changes the slope or intercept.</li>
<li><span class="hl">Outlier in regression:</span> Large residual (far above or below the line).</li>
</ul>
<p style="margin-top:8px">A point can be an outlier without being influential (if its x is not extreme). A high-leverage point is not necessarily an outlier in y, but it can distort the slope.</p></div>
<div class="flag" data-f="KEY WARNINGS"><p>1. Correlation ≠ causation. Always consider lurking variables.<br>2. Don\'t extrapolate beyond the data range.<br>3. A high r² doesn\'t guarantee a linear model is appropriate — always check the residual plot.<br>4. r and b always have the same sign.</p></div>
</div>`},

{id:'u3',label:'Unit 3: Collecting Data',grp:'📊 Exploratory Data',tag:'Unit 3 — Collecting Data',
qs:[
{q:'A researcher wants to study whether a new drug reduces blood pressure. She randomly assigns 200 patients to either the drug or a placebo. This is an example of:',opts:['An observational study','A simple random sample','A randomized experiment','A stratified sample'],ans:2,fb:'Randomly assigning subjects to treatment groups is the defining feature of an experiment. This allows causal conclusions. An observational study only observes — it doesn\'t assign treatments.'},
{q:'Which of the following is the key advantage of a randomized experiment over an observational study?',opts:['Larger sample sizes are possible','Causal conclusions can be drawn','It is less expensive to conduct','It can be done without consent'],ans:1,fb:'Random assignment of treatments controls for confounding variables (both known and unknown), allowing the researcher to conclude that the treatment caused the observed effect. Observational studies can show association but not causation.'},
{q:'In a stratified random sample, the population is divided into groups called strata, and then:',opts:['Every member of each stratum is sampled','A random sample is taken from each stratum','One stratum is randomly selected and fully sampled','Members are selected based on convenience'],ans:1,fb:'In stratified sampling, the population is divided into homogeneous groups (strata), and then a random sample is taken from EACH stratum. This ensures representation from all groups and can give more precise estimates.'},
{q:'What is the purpose of a control group in an experiment?',opts:['To increase sample size','To provide a baseline for comparison','To eliminate sampling variability','To ensure every subject is treated'],ans:1,fb:'The control group receives no treatment (or a placebo) and provides a baseline. Comparing the treatment group to the control group isolates the effect of the treatment. Without a control group, you can\'t know if changes are due to the treatment or other factors.'},
{q:'A survey asks: "Don\'t you agree that violent video games should be banned?" This is an example of:',opts:['Nonresponse bias','Response bias (leading question)','Voluntary response bias','Undercoverage'],ans:1,fb:'This is a leading question — the wording suggests a particular answer ("Don\'t you agree"). This is response bias. It doesn\'t measure true opinion; it nudges respondents toward agreement. Good surveys use neutral wording.'},
{q:'In an experiment, neither the subjects nor the evaluators know which treatment each subject received. This is called:',opts:['Single-blind','Double-blind','Placebo-controlled','Block design'],ans:1,fb:'Double-blind means both the subjects AND the people evaluating outcomes don\'t know treatment assignments. This prevents bias: subjects can\'t change behavior knowing their treatment, and evaluators can\'t unconsciously score differently based on treatment group.'},
{q:'A cluster sample is different from a stratified sample because:',opts:['Cluster sampling uses random selection; stratified does not','In cluster sampling, the entire cluster is sampled; in stratified, a sample is taken from each group','Cluster sampling is more accurate','Stratified sampling is only for categorical data'],ans:1,fb:'In cluster sampling, the population is divided into clusters, some clusters are randomly selected, and ALL members of chosen clusters are sampled. In stratified sampling, ALL strata are represented and a sample is taken from each. Cluster sampling is convenient but usually less precise than stratified.'},
{q:'Which of the following is an example of voluntary response bias?',opts:['Surveying only students in the library','An online poll where anyone can choose to participate','Asking only your friends their opinions','Selecting every 10th person from a list'],ans:1,fb:'Voluntary response samples attract people with strong opinions (usually negative). Results are biased because participants self-select. The internet poll is classic voluntary response bias — those who feel strongly are more likely to respond.'},
{q:'The placebo effect refers to:',opts:['The effect of the actual drug treatment','A subject experiencing benefits from a fake treatment due to expectation','The difference between treatment and control group means','The error due to random assignment'],ans:1,fb:'The placebo effect occurs when subjects improve simply because they believe they received a real treatment. This is why double-blind, placebo-controlled experiments are the gold standard — they control for this psychological effect.'},
{q:'Blocking in an experiment is used to:',opts:['Increase the number of treatments','Reduce the effect of known sources of variability','Eliminate all confounding variables','Ensure a larger sample size'],ans:1,fb:'Blocking groups subjects with similar characteristics together, then randomly assigns treatments within each block. This reduces variability due to the blocking variable, making it easier to detect treatment effects. Example: block by gender if gender might affect the response.'},
{q:'An observational study finds that people who eat breakfast regularly score higher on tests. Can we conclude that eating breakfast improves test scores?',opts:['Yes, because the association is strong','No, because there may be confounding variables','Yes, because the sample size was large','No, because observational studies use bad methods'],ans:1,fb:'No — we can only establish association, not causation, from an observational study. Confounding variables (socioeconomic status, sleep habits, general health) may cause both breakfast eating and better test performance. We cannot randomly assign "eat breakfast" like a drug.'},
{q:'Undercoverage bias occurs when:',opts:['Some members of the population are not included in the sampling frame','The survey response rate is low','Questions are worded in a misleading way','The sample size is too small'],ans:0,fb:'Undercoverage means some members of the population have no chance of being selected (they\'re excluded from the sampling frame). For example, a phone survey excludes people without phones. This creates bias if the excluded group differs from the included group.'},
{q:'Which sampling method gives every possible sample of size n an equal chance of being selected?',opts:['Stratified random sample','Systematic random sample','Simple random sample (SRS)','Cluster sample'],ans:2,fb:'An SRS gives every possible sample of size n (not just every individual) an equal chance of selection. This is the gold standard for unbiased sampling. Systematic, stratified, and cluster sampling don\'t guarantee this property, though they are still random.'},
{q:'The principle of replication in experimental design means:',opts:['The experiment should be repeated multiple times by different researchers','Each treatment should be applied to multiple subjects','The same treatment should be applied twice to each subject','The experiment should have a control group'],ans:1,fb:'Replication means applying each treatment to multiple subjects (experimental units). This allows us to distinguish the treatment effect from natural individual variation. A treatment applied to only one subject tells us nothing reliable — that person could be unusual.'},
{q:'A matched pairs design is most useful when:',opts:['There are more than two treatments','Each subject serves as their own control or subjects are paired by similar characteristics','The sample size is very large','Treatments are assigned completely at random'],ans:1,fb:'Matched pairs is a form of blocking where each subject gets both treatments (crossover design), or subjects are paired by a characteristic, then treatments are randomly assigned within pairs. This controls for individual variability and is very efficient.'}
],
frqs:[
{title:'Experimental Design',pts:12,
prompt:'A school wants to test whether background music improves student focus during study sessions. There are 60 student volunteers available.',
parts:[
{q:'(a) Describe a completely randomized design for this experiment. Include how you would randomly assign students to groups.',pts:4,
solution:'Completely Randomized Design:\n1. Identify 2 treatment groups: (1) Study with background music, (2) Study in silence (control)\n2. Randomly assign 30 students to each group:\n   Number each student 1–60. Use a random number generator (or table) to select 30 numbers. Those students receive background music; the remaining 30 study in silence.\n3. All students study the same material for the same duration under identical conditions except for music/no music.\n4. Measure focus using a standardized assessment (e.g., a comprehension test or self-reported focus scale).\n5. Compare mean focus scores between groups.',
rubric:[{pts:1,text:'Identifies two treatment groups (music and silence/control)'},{pts:1,text:'Describes random assignment mechanism (random numbers, drawing names, etc.)'},{pts:1,text:'States equal or near-equal group sizes (30 each)'},{pts:1,text:'Identifies a specific, measurable response variable'}]},
{q:'(b) Explain why random assignment is important in this experiment.',pts:2,
solution:'Random assignment ensures that the two groups are roughly equivalent in all other characteristics (study habits, baseline focus ability, sleep patterns, etc.) before the experiment begins. Any pre-existing differences between students will be distributed roughly equally between groups by chance. This controls for confounding variables — both known and unknown — so any observed difference in focus can be attributed to the music treatment rather than some other factor.',
rubric:[{pts:1,text:'States that random assignment balances confounding variables between groups'},{pts:1,text:'Concludes this allows causal inference (effect attributed to treatment)'}]},
{q:'(c) A student suggests using a matched-pairs design instead, where each student studies once with music and once without. What is one advantage and one disadvantage of this approach?',pts:4,
solution:'Advantage: Each student serves as their own control, which eliminates individual variability (some students are naturally better at focusing). This reduces variability in the response and makes it easier to detect a treatment effect with the same number of subjects.\n\nDisadvantage: Carryover effects are a problem. If a student studies the same material both times, they will have already learned some of it in the first session, making the second session easier regardless of music. Also, order effects may occur — students may be more tired in the second session. You would need to randomly assign which condition comes first AND use different (equivalent) study materials in each session, which complicates the design.',
rubric:[{pts:1,text:'Advantage: controls for individual variation / each subject is own control'},{pts:1,text:'Advantage stated in context'},{pts:1,text:'Disadvantage: carryover effects / order effects / fatigue'},{pts:1,text:'Disadvantage explained in context'}]},
{q:'(d) Explain how you would incorporate blinding in this experiment, and why it might be difficult.',pts:2,
solution:'Ideally, you would use a double-blind design: students don\'t know which condition is considered "treatment" vs. "control," and the people assessing focus don\'t know which condition each student was in. However, blinding is difficult here because students obviously know whether they can hear music or not — you cannot hide this from them. Single-blinding is possible: those assessing focus scores could be kept unaware of which condition each student was in. You could label groups A and B rather than "music" and "silence."',
rubric:[{pts:1,text:'Correctly describes what blinding means in this context'},{pts:1,text:'Identifies that complete subject blinding is impossible (students know if music is playing); suggests single-blinding the evaluators'}]}
]},
{title:'Sampling Methods and Bias',pts:10,
prompt:'A city wants to estimate the proportion of residents who support a new park. The city has 50,000 residents in 5 districts of roughly equal size.',
parts:[
{q:'(a) Describe how to select an SRS of 500 residents.',pts:3,
solution:'1. Obtain a list (sampling frame) of all 50,000 residents with unique ID numbers 1–50,000.\n2. Use a random number generator (or random number table) to select 500 distinct numbers between 1 and 50,000.\n3. Survey the 500 residents corresponding to those ID numbers.\n\nThis gives every possible group of 500 residents an equal chance of being selected, making it a simple random sample.',
rubric:[{pts:1,text:'Assigns unique numbers to all residents (or equivalent)'},{pts:1,text:'Uses random mechanism to select 500'},{pts:1,text:'States that every individual (or group of 500) has equal chance — defines SRS'}]},
{q:'(b) Describe a stratified random sample using the 5 districts. Why might this be preferable to an SRS?',pts:3,
solution:'Stratified design: Treat each of the 5 districts as a stratum. Randomly select 100 residents from each district (500/5 = 100 per stratum). Use a separate SRS within each district.\n\nAdvantage over SRS: Stratified sampling guarantees proportional representation from each district. If districts differ in their support levels (e.g., District 1 is near the park and more supportive), an SRS might by chance oversample some districts. Stratification reduces sampling variability and produces a more precise estimate of the city-wide proportion.',
rubric:[{pts:1,text:'Correctly identifies taking random sample from each district'},{pts:1,text:'Specifies 100 from each district (or proportional allocation)'},{pts:1,text:'Explains advantage: ensures all districts represented / reduces variability'}]},
{q:'(c) The survey is conducted by mail. Only 180 of the 500 selected residents respond. Identify the type of bias and explain its potential effect.',pts:2,
solution:'This is nonresponse bias. Only 180/500 = 36% responded. Those who chose to respond may differ systematically from non-responders — for example, residents with strong opinions (either strongly supporting or strongly opposing the park) may be more likely to respond than those who are indifferent. This could make the estimated proportion either higher or lower than the true city-wide proportion, depending on which group is over-represented among responders. The estimate cannot be trusted to represent all 50,000 residents.',
rubric:[{pts:1,text:'Identifies nonresponse bias'},{pts:1,text:'Explains that responders may differ from non-responders in a systematic way, making results unrepresentative'}]},
{q:'(d) Why is a voluntary response sample (e.g., a social media poll) a poor substitute for the probability sample described above?',pts:2,
solution:'A voluntary response sample lets people choose whether to participate. This attracts those with strong opinions — typically those who feel most strongly about the park (either very supportive or strongly opposed). People who are neutral or don\'t care about the issue are unlikely to seek out the poll and respond. This creates voluntary response bias, systematically over-representing extreme opinions. The results cannot be generalized to the full population of 50,000 residents because the sample is self-selected, not randomly selected.',
rubric:[{pts:1,text:'Identifies voluntary response bias'},{pts:1,text:'Explains that strong-opinion people self-select, making results not representative of all residents'}]}
]}
],
render:()=>`<div class="lesson">
<div class="l-ey">Unit 3 — Collecting Data</div><div class="l-title">COLLECTING DATA</div>
<div class="l-desc">Good data collection is the foundation of valid statistical conclusions. The method used to collect data determines what conclusions are possible. Only randomized experiments can establish causation.</div>
<div class="cb"><h3>Observational Studies vs. Experiments</h3>
<ul>
<li><span class="hl">Observational study:</span> Researcher observes without intervening. Can show association. CANNOT establish causation due to potential confounding.</li>
<li><span class="hl">Experiment:</span> Researcher randomly assigns treatments to subjects. Can establish causation because random assignment controls confounding.</li>
</ul>
<div class="eq"><div class="eql">Key Principle</div><div class="eqb">ONLY randomized experiments → causal conclusions
Observational studies → association only

Confounding variable: associated with both the explanatory
and response variables, creating a spurious relationship.</div></div></div>
<div class="cb"><h3>Sampling Methods</h3>
<div class="eq"><div class="eql">Four Main Probability Sampling Methods</div><div class="eqb">SRS (Simple Random Sample):
  Every possible sample of size n has equal chance.
  Use random numbers to select from numbered list.

Stratified Random Sample:
  Divide into strata (homogeneous groups), take SRS from each.
  Advantage: guarantees representation, reduces variability.

Cluster Sample:
  Divide into clusters, randomly select clusters, sample ALL in chosen clusters.
  Advantage: convenient when a list of all individuals doesn\'t exist.

Systematic Random Sample:
  Select every kth individual from a list, with random start.
  Simple but can be biased if list has periodic pattern.</div></div></div>
<div class="cb"><h3>Sources of Bias</h3>
<ul>
<li><span class="hl">Voluntary response bias:</span> Self-selected participants — strong opinions over-represented.</li>
<li><span class="hl">Convenience sampling:</span> Easy-to-reach individuals — not representative.</li>
<li><span class="hl">Undercoverage:</span> Some groups excluded from sampling frame.</li>
<li><span class="hl">Nonresponse bias:</span> Those who don\'t respond differ systematically from those who do.</li>
<li><span class="hl">Response bias:</span> Wording, interviewer presence, or social desirability affect answers.</li>
</ul></div>
<div class="cb"><h3>Principles of Experimental Design</h3>
<div class="eq"><div class="eql">Four Principles</div><div class="eqb">1. CONTROL: Hold all other variables constant (same conditions
   for all groups except the treatment variable).

2. RANDOMIZATION: Randomly assign subjects to treatments.
   Controls for both known and unknown confounders.

3. REPLICATION: Apply each treatment to multiple subjects.
   Reduces the effect of individual variation.

4. BLOCKING: Group similar subjects, randomize within blocks.
   Controls for known sources of variability (e.g., block by gender).

Placebo: fake treatment to control for placebo effect.
Blinding: subjects don\'t know their treatment (single-blind).
Double-blind: neither subjects NOR evaluators know assignments.</div></div></div>
<div class="flag" data-f="CAUSATION"><p>The most important concept in data collection: random assignment (not random sampling) allows causal conclusions. Random sampling allows generalization to the population. A well-designed study has BOTH — random sampling from the population AND random assignment to treatments.</p></div>
</div>`},

render:()=>`<div class="lesson">
<div class="l-ey">Unit 4 — Probability</div><div class="l-title">PROBABILITY & RANDOM VARIABLES</div>
<div class="l-desc">Probability gives us a framework for uncertainty. Random variables assign numerical values to outcomes. The binomial and normal distributions are the two most important in AP Stats.</div>
<div class="cb"><h3>Basic Probability Rules</h3>
<div class="eq"><div class="eql">Core Rules</div><div class="eqb">Complement: P(Aᶜ)=1−P(A)
Addition: P(A or B)=P(A)+P(B)−P(A and B)
Mutually exclusive: P(A and B)=0
Conditional: P(A|B)=P(A and B)/P(B)
Independent: P(A|B)=P(A)  ↔  P(A and B)=P(A)·P(B)</div></div></div>
<div class="cb"><h3>Discrete Random Variables</h3>
<div class="eq"><div class="eql">Expected Value and Rules</div><div class="eqb">E(X)=Σx·P(x)
Var(X)=Σ(x−μ)²·P(x)
SD(X)=√Var(X)

Linear transformations:
  E(aX+b)=aE(X)+b
  SD(aX+b)=|a|·SD(X)

Independent variables:
  E(X±Y)=E(X)±E(Y)
  Var(X+Y)=Var(X)+Var(Y)
  Var(X−Y)=Var(X)+Var(Y)  ← variances always ADD</div></div></div>
<div class="cb"><h3>Binomial Distribution</h3>
<div class="eq"><div class="eql">Binomial: BINS + Formulas</div><div class="eqb">BINS: Binary, Independent, fixed N, Same p
X~Bin(n,p)
P(X=k)=C(n,k)·p^k·(1−p)^(n−k)
μ=np
σ=√(np(1−p))</div></div></div>
<div class="cb"><h3>Normal Distribution</h3>
<div class="eq"><div class="eql">Normal</div><div class="eqb">X~N(μ,σ)
Standardize: z=(x−μ)/σ → use z-table

Empirical rule:
  μ±1σ → 68%
  μ±2σ → 95%
  μ±3σ → 99.7%</div></div></div>
</div>`},

render:()=>`<div class="lesson">
<div class="l-ey">Unit 5 — Inference Foundations</div><div class="l-title">SAMPLING DISTRIBUTIONS</div>
<div class="l-desc">A sampling distribution is the distribution of a statistic over all possible samples of size n. The Central Limit Theorem is the most important theorem in statistics — it justifies using normal-based inference procedures for means.</div>
<div class="cb"><h3>Key Vocabulary</h3>
<ul>
<li><span class="hl">Parameter:</span> Fixed number describing a population (μ,σ,p). Usually unknown.</li>
<li><span class="hl">Statistic:</span> Number computed from a sample (x̄,s,p̂). Varies sample to sample.</li>
<li><span class="hl">Sampling distribution:</span> Distribution of a statistic over all possible samples of size n.</li>
<li><span class="hl">Standard error:</span> SD of the sampling distribution. Measures sampling variability.</li>
<li><span class="hl">Unbiased:</span> Mean of sampling distribution = population parameter.</li>
</ul></div>
<div class="cb"><h3>Sampling Distribution of x̄</h3>
<div class="eq"><div class="eql">x̄ Sampling Distribution</div><div class="eqb">Center: μ_x̄=μ  (unbiased)
Spread: SE=σ/√n
Shape: Normal if population normal (any n)
       Approximately normal if n≥30 (CLT)

Standardize: z=(x̄−μ)/(σ/√n)

CLT: As n→∞, x̄~N(μ, σ/√n) regardless of population.</div></div></div>
<div class="cb"><h3>Sampling Distribution of p̂</h3>
<div class="eq"><div class="eql">p̂ Sampling Distribution</div><div class="eqb">Conditions: Random, Large Counts (np≥10 AND n(1−p)≥10), 10%

Center: μ_p̂=p  (unbiased)
Spread: SD(p̂)=√(p(1−p)/n)
Shape: Approximately normal when conditions met

Standardize: z=(p̂−p)/√(p(1−p)/n)</div></div></div>
<div class="flag" data-f="CRITICAL"><p>When computing P for a sample mean, use SE=σ/√n — NOT σ. Using σ instead of SE is the most common error. The SE is much smaller than σ because averaging reduces variability.</p></div>
</div>`},

{q:'(a) State hypotheses.',pts:2,solution:'H₀: p=0.30 (true proportion of red candies is 30%)\nHₐ: p≠0.30 (proportion differs from 30%)\nwhere p=true proportion of red candies.',rubric:[{pts:1,text:'H₀: p=0.30 in terms of parameter'},{pts:1,text:'Hₐ: p≠0.30; defines p in context'}]},
{q:'(b) Check all conditions.',pts:3,solution:'Random: stated ✓\nLarge Counts (using p₀=0.30): np₀=200(0.30)=60≥10 ✓; n(1−p₀)=200(0.70)=140≥10 ✓\n10%: 200 < 10% of all candies produced ✓\nAll conditions met.',rubric:[{pts:1,text:'Random ✓'},{pts:1,text:'Large Counts using p₀: 60≥10 and 140≥10'},{pts:1,text:'10% condition ✓'}]},
{q:'(c) Calculate test statistic and P-value.',pts:4,solution:'p̂=72/200=0.36\nz=(0.36−0.30)/√(0.30×0.70/200)=0.06/√(0.00105)=0.06/0.03240=1.852\nP-value (two-sided)=2·P(z>1.852)=2(0.0319)=0.0638',rubric:[{pts:1,text:'p̂=0.36'},{pts:1,text:'Correct z formula using p₀ in SE'},{pts:1,text:'z≈1.85'},{pts:1,text:'P≈0.064 two-sided'}]},

]},

render:()=>`<div class="lesson">
<div class="l-ey">Unit 6 — Inference</div><div class="l-title">INFERENCE FOR PROPORTIONS</div>
<div class="l-desc">For proportions, we use z-procedures. The two critical skills: state hypotheses in terms of parameters, and interpret confidence intervals correctly.</div>
<div class="cb"><h3>Confidence Intervals for p</h3>
<div class="eq"><div class="eql">One-Sample z-Interval for p</div><div class="eqb">Conditions: Random, Large Counts (np̂≥10, n(1−p̂)≥10), 10%

Formula: p̂ ± z*·√(p̂(1−p̂)/n)
z*: 1.645 (90%), 1.96 (95%), 2.576 (99%)

Interpretation: "We are C% confident that the interval
captures the true population proportion p."

Sample size: n≥(z*/ME)²·p̂(1−p̂)
  Use p̂=0.5 if unknown (conservative)</div></div></div>
<div class="cb"><h3>Hypothesis Tests for p</h3>
<div class="eq"><div class="eql">One-Sample z-Test for p</div><div class="eqb">H₀: p=p₀   Hₐ: p>p₀ or p<p₀ or p≠p₀

Conditions: Random, Large Counts (np₀≥10, n(1−p₀)≥10), 10%
Use p₀ (not p̂) for Large Counts in tests.

z=(p̂−p₀)/√(p₀(1−p₀)/n)

P<α → reject H₀ → evidence for Hₐ
P>α → fail to reject H₀</div></div></div>
<div class="flag" data-f="NEVER SAY"><p>"Accept H₀" — always "fail to reject H₀." Never say "prove." Use language of evidence: "There is sufficient/insufficient evidence to conclude..."</p></div>
</div>`},

render:()=>`<div class="lesson">
<div class="l-ey">Unit 7 — Inference</div><div class="l-title">INFERENCE FOR MEANS</div>
<div class="l-desc">When σ is unknown, we use t-procedures. The t-distribution has heavier tails than the normal to account for extra uncertainty. Paired designs control for individual variability and are more powerful than two-sample designs for matched data.</div>
<div class="cb"><h3>One-Sample t-Procedures</h3>
<div class="eq"><div class="eql">Conditions and Formulas</div><div class="eqb">Conditions: Random, Normal/Large Sample, 10%

t-interval: x̄±t*·(s/√n), df=n−1
t-test: t=(x̄−μ₀)/(s/√n), df=n−1

Normal/Large Sample condition:
  Population normal OR n≥30 OR
  Small n with no strong skew/outliers in data</div></div></div>
<div class="cb"><h3>Paired vs Two-Sample</h3>
<div class="eq"><div class="eql">Paired t</div><div class="eqb">Use when: observations naturally paired
Compute: d=x₁−x₂ for each pair
Then: one-sample t-test on differences d
H₀: μ_d=0, df=n−1 (n=number of pairs)

Two-sample t (independent groups):
CI: (x̄₁−x̄₂)±t*·√(s₁²/n₁+s₂²/n₂)
Test: t=(x̄₁−x̄₂)/√(s₁²/n₁+s₂²/n₂)
df: use technology</div></div></div>
</div>`},

render:()=>`<div class="lesson">
<div class="l-ey">Unit 8 — Inference</div><div class="l-title">CHI-SQUARE TESTS</div>
<div class="l-desc">Chi-square tests analyze categorical data. Three types: goodness-of-fit, independence, and homogeneity. All use χ²=Σ(O−E)²/E. The key condition: all expected counts≥5.</div>
<div class="cb"><h3>Three Chi-Square Tests</h3>
<ul>
<li><span class="hl">Goodness-of-Fit:</span> Does one variable follow a claimed distribution? df=k−1.</li>
<li><span class="hl">Independence:</span> Are two categorical variables associated? One sample, two variables. df=(r−1)(c−1).</li>
<li><span class="hl">Homogeneity:</span> Same distribution across multiple populations? df=(r−1)(c−1).</li>
</ul></div>
<div class="cb"><h3>Procedure</h3>
<div class="eq"><div class="eql">Chi-Square Test Steps</div><div class="eqb">1. State H₀ (distribution matches / variables independent)
2. Check conditions: Random, Large Counts (all E≥5), 10%
3. E=(row total×col total)/grand total
4. χ²=Σ(O−E)²/E
5. P-value: P(χ²_df>observed) — always right-tailed
6. Conclude: P<α → evidence against H₀</div></div></div>
</div>`},

render:()=>`<div class="lesson">
<div class="l-ey">Unit 9 — Inference</div><div class="l-title">INFERENCE FOR REGRESSION SLOPES</div>
<div class="l-desc">We use the sample slope b to make inferences about the true population slope β. t-procedures with df=n−2. Check LINE conditions with residual plots.</div>
<div class="cb"><h3>Population Model and Parameters</h3>
<div class="eq"><div class="eql">Regression Model</div><div class="eqb">Population: y=α+βx+ε   (ε~N(0,σ))
Sample:     ŷ=a+bx
H₀: β=0 (no linear relationship)
t=b/SE_b, df=n−2
CI: b±t*·SE_b</div></div></div>
<div class="cb"><h3>LINE Conditions</h3>
<div class="eq"><div class="eql">Check All Four</div><div class="eqb">L: Linear — scatterplot linear; residual plot no curve
I: Independent — random sample; 10% condition
N: Normal residuals — histogram approx normal; large n OK
E: Equal variance — residual plot constant spread; no fan shape</div></div></div>
<div class="cb"><h3>Reading Computer Output</h3>
<ul>
<li><span class="hl">Coefficient:</span> b (slope) or a (intercept)</li>
<li><span class="hl">SE:</span> SE_b — standard error of slope</li>
<li><span class="hl">T:</span> t=b/SE_b</li>
<li><span class="hl">P:</span> P-value for H₀: β=0</li>
<li><span class="hl">s:</span> SD of residuals (typical prediction error)</li>
<li><span class="hl">R-sq:</span> r² — % variation in y explained by x</li>
</ul></div>
<div class="flag" data-f="KEY"><p>df=n−2 for regression inference (not n−1). Always use t, never z. Reading and interpreting computer output — slope, SE, t, P, s, R² — is a core AP exam skill.</p></div>
</div>`}
